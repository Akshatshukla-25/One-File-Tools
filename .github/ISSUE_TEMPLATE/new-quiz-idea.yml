name: New Quiz Idea
description: Propose a new multiple-choice quiz.
title: "Idea: "
labels: ["idea", "quizzes"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a new quiz! Please fill in the details below.
        Quizzes are quick multiple-choice challenges to test developer knowledge. Make sure your idea isn't already an existing quiz or open issue.

  - type: input
    id: quiz-name
    attributes:
      label: Quiz Name
      description: A short, descriptive name for the quiz.
      placeholder: e.g. CSS Selectors Challenge, Git Branching Quiz
    validations:
      required: true

  - type: input
    id: filename
    attributes:
      label: Proposed Filename
      description: Kebab-case .html filename.
      placeholder: e.g. css-selectors-challenge.html
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which category does this quiz belong to?
      options:
        - Git & Version Control
        - CSS Fundamentals
        - JavaScript Fundamentals
        - React Fundamentals
        - General Dev Quests
        - Other (propose a new category in the description)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What topic does this quiz cover? What's the learning goal?
      placeholder: Describe the quiz's topic and what knowledge it tests.
    validations:
      required: true

  - type: textarea
    id: features
    attributes:
      label: Key Features
      description: List the main features (use bullet points).
      placeholder: |
        - Feature 1
        - Feature 2
        - Feature 3
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Suggested Difficulty
      description: How complex do you think this quiz is? (Final label assigned by maintainer, slightly negotiable.)
      options:
        - Easy
        - Medium
    validations:
      required: true

  - type: textarea
    id: tags
    attributes:
      label: Tags
      description: Comma-separated tags for filtering on the landing page.
      placeholder: e.g. css, selectors, specificity, quiz

  - type: textarea
    id: references
    attributes:
      label: References / Inspiration
      description: Any existing quizzes, tools, or links for reference? (optional)
      placeholder: Links to similar quizzes or screenshots for inspiration.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have checked existing quizzes and open issues for duplicates.
          required: true
        - label: This quiz can be built as a single self-contained HTML file.
          required: true
        - label: This quiz does not require a backend server to function.
          required: true
