<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Profile Card — Design System</title>

    <script>
      (function () {
        try {
          var stored = localStorage.getItem("profile_card_theme_v1");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (stored === "dark" || (!stored && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {
          /* localStorage unavailable — fall back to light theme silently */
        }
      })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              display: ["Space Grotesk", "ui-sans-serif", "sans-serif"],
              sans: ["Inter", "-apple-system", "BlinkMacSystemFont", "Segoe UI", "Roboto", "sans-serif"],
              mono: ['"IBM Plex Mono"', "ui-monospace", "monospace"],
            },
            colors: {
              brass: {
                300: "#EFCB8B",
                400: "#E4B36A",
                500: "#D9A24B",
                600: "#B9822F",
                700: "#8F6423",
              },
              signal: {
                300: "#8FDBCC",
                400: "#63C2B0",
                500: "#3FA796",
                600: "#2C8577",
              },
              spruce: {
                50: "#F4F6F2",
                100: "#E8EEE9",
                200: "#D3DED6",
                800: "#12201C",
                900: "#0F1D18",
                950: "#0A1512",
              },
            },
            boxShadow: {
              glow: "0 0 0 1px rgba(217,162,75,0.12), 0 24px 60px -20px rgba(15,29,24,0.35)",
              "glow-dark": "0 0 0 1px rgba(228,179,106,0.14), 0 24px 60px -18px rgba(0,0,0,0.65)",
            },
          },
        },
      };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
      }

      /* Ambient mesh gradient behind the page */
      .bg-mesh {
        background-image:
          radial-gradient(at 12% 8%, rgba(217, 162, 75, 0.16) 0px, transparent 55%),
          radial-gradient(at 88% 16%, rgba(63, 167, 150, 0.16) 0px, transparent 50%),
          radial-gradient(at 50% 100%, rgba(217, 162, 75, 0.08) 0px, transparent 45%);
      }
      .dark .bg-mesh {
        background-image:
          radial-gradient(at 12% 8%, rgba(217, 162, 75, 0.14) 0px, transparent 55%),
          radial-gradient(at 88% 16%, rgba(63, 167, 150, 0.14) 0px, transparent 50%),
          radial-gradient(at 50% 100%, rgba(217, 162, 75, 0.07) 0px, transparent 45%);
      }

      /* Glass card surface */
      .glass-card {
        background: rgba(255, 255, 255, 0.68);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .dark .glass-card {
        background: rgba(18, 32, 28, 0.62);
      }

      /*AVATAR */
      .avatar-frame {
        background: conic-gradient(from 220deg, #e4b36a, #63c2b0 35%, #b9822f 60%, #2c8577 85%, #e4b36a);
        animation: avatar-enter 700ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      @keyframes avatar-enter {
        from {
          opacity: 0;
          transform: scale(0.92);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .avatar-mesh {
        background:
          radial-gradient(circle at 30% 100%, rgba(0, 0, 0, 0.32) 0%, transparent 55%),
          conic-gradient(from 210deg, #e4b36a, #63c2b0, #b9822f, #2c8577, #e4b36a);
      }
      .avatar-shine {
        position: absolute;
        inset: -45%;
        background: linear-gradient(115deg, transparent 30%, rgba(255, 255, 255, 0.55) 48%, transparent 62%);
        transform: translateX(-120%) rotate(8deg);
        transition: transform 800ms ease;
        pointer-events: none;
      }
      .avatar-wrap:hover .avatar-shine {
        transform: translateX(120%) rotate(8deg);
      }
      @media (prefers-reduced-motion: reduce) {
        .avatar-frame {
          animation: none;
        }
        .avatar-shine {
          display: none;
        }
        .status-dot::after {
          animation: none !important;
        }
      }

      /* Live-status dot with a gentle ping, like a presence indicator */
      .status-dot {
        position: relative;
      }
      .status-dot::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 9999px;
        background: inherit;
        animation: status-ping 2.2s cubic-bezier(0, 0, 0.2, 1) infinite;
      }
      @keyframes status-ping {
        0% {
          transform: scale(1);
          opacity: 0.6;
        }
        100% {
          transform: scale(2.2);
          opacity: 0;
        }
      }

      /* Follow button: solid → outline state swap via one class,
         instead of toggling a long list of utility classes in JS */
      .btn-follow {
        background-image: linear-gradient(to right, #e4b36a, #d9a24b);
        color: #0a1512;
        box-shadow: 0 8px 20px -8px rgba(217, 162, 75, 0.45);
      }
      .btn-follow:hover {
        box-shadow: 0 10px 24px -8px rgba(217, 162, 75, 0.55);
      }
      .btn-follow.is-following {
        background-image: none;
        background-color: rgba(63, 167, 150, 0.1);
        color: #2c8577;
        box-shadow: none;
        border: 1px solid rgba(63, 167, 150, 0.4);
      }
      .dark .btn-follow.is-following {
        background-color: rgba(99, 194, 176, 0.12);
        color: #8fdbcc;
        border-color: rgba(99, 194, 176, 0.35);
      }

      /* Focus ring — one consistent visible ring for every interactive element */
      .focus-ring:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px rgba(217, 162, 75, 0.5), 0 0 0 4px rgba(244, 246, 242, 0.6);
      }
      .dark .focus-ring:focus-visible {
        box-shadow: 0 0 0 2px rgba(228, 179, 106, 0.6), 0 0 0 4px rgba(10, 21, 18, 0.9);
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          transition-duration: 1ms !important;
          animation-duration: 1ms !important;
        }
      }
    </style>
  </head>

  <body class="bg-spruce-50 dark:bg-spruce-950 text-spruce-900 dark:text-spruce-50 min-h-screen antialiased transition-colors duration-300">
    <div class="fixed inset-0 -z-10 bg-mesh" aria-hidden="true"></div>

    <div class="max-w-5xl mx-auto px-4 sm:px-6 py-10 sm:py-14">
      <!-- Header -->
      <header class="flex items-start justify-between gap-4 mb-10 sm:mb-14">
       

        <button
          id="theme-toggle"
          type="button"
          aria-label="Toggle dark mode"
          aria-pressed="false"
          class="focus-ring transition-colors shrink-0 w-11 h-11 rounded-xl border border-spruce-900/10 dark:border-white/10 flex items-center justify-center hover:bg-white dark:hover:bg-white/10"
        >
          <svg class="w-[18px] h-[18px] hidden dark:block" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.7" />
            <path
              stroke="currentColor"
              stroke-width="1.7"
              stroke-linecap="round"
              d="M12 2.5v2.2M12 19.3v2.2M21.5 12h-2.2M4.7 12H2.5M18.4 5.6l-1.55 1.55M7.15 16.85l-1.55 1.55M18.4 18.4l-1.55-1.55M7.15 7.15 5.6 5.6"
            />
          </svg>
          <svg class="w-[18px] h-[18px] block dark:hidden" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" d="M20.5 14.2A8.5 8.5 0 0 1 9.8 3.5a8.5 8.5 0 1 0 10.7 10.7Z" />
          </svg>
        </button>
      </header>

      <!-- Showcase -->
      <section aria-label="Profile card preview" class="flex items-center justify-center py-6 sm:py-10">
        <article
          aria-labelledby="profile-name"
          class="w-full max-w-sm rounded-[28px] border border-spruce-900/8 dark:border-white/10 glass-card shadow-glow dark:shadow-glow-dark px-7 py-9 sm:px-9 sm:py-10 flex flex-col items-center text-center"
        >
          <!-- Avatar -->
          <div class="avatar-wrap relative mb-5">
            <div class="avatar-frame w-[104px] h-[104px] sm:w-[116px] sm:h-[116px] rounded-full p-[3px]">
              <div class="w-full h-full rounded-full bg-spruce-50 dark:bg-spruce-950 p-[3px]">
                <div class="avatar-mesh relative w-full h-full rounded-full flex items-center justify-center overflow-hidden">
                  <span class="avatar-shine" aria-hidden="true"></span>
                  <span class="font-display font-semibold text-3xl sm:text-4xl text-white drop-shadow-[0_1px_6px_rgba(0,0,0,0.45)]" aria-hidden="true">AC</span>
                </div>
              </div>
            </div>
            <span
              class="status-dot absolute bottom-1.5 right-1.5 w-4 h-4 rounded-full bg-signal-500 border-2 border-spruce-50 dark:border-spruce-950"
              role="img"
              aria-label="Active now"
            ></span>
          </div>

          <!-- Identity -->
          <h2 id="profile-name" class="font-display font-semibold text-2xl tracking-tight text-spruce-900 dark:text-white">Adrian Cole</h2>
          <p class="mt-1 text-sm font-medium text-brass-600 dark:text-brass-400">Senior Product Designer</p>

          <!-- Bio -->
          <p class="mt-4 text-[15px] leading-relaxed text-spruce-800/75 dark:text-spruce-100/70 max-w-[30ch]">
            Designing clear, human-centered products. 9+ years partnering with engineering and research to ship work that scales.
          </p>

          <div class="w-full h-px my-6 bg-gradient-to-r from-transparent via-spruce-900/12 dark:via-white/15 to-transparent" aria-hidden="true"></div>

          <!-- Social links: icons only, non-functional -->
          <div role="group" aria-label="Social links" class="flex items-center justify-center gap-3">
            <button
              type="button"
              aria-label="GitHub profile"
              class="focus-ring transition-colors w-10 h-10 rounded-full flex items-center justify-center border border-spruce-900/10 dark:border-white/10 text-spruce-700 dark:text-spruce-200 hover:text-brass-600 dark:hover:text-brass-400 hover:border-brass-400/50"
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path
                  d="M12 2.2c-5.5 0-10 4.5-10 10 0 4.4 2.9 8.1 6.8 9.4.5.1.7-.2.7-.5v-1.8c-2.8.6-3.4-1.2-3.4-1.2-.4-1.1-1.1-1.4-1.1-1.4-.9-.6.1-.6.1-.6 1 .1 1.5 1 1.5 1 .9 1.5 2.3 1.1 2.9.8.1-.7.4-1.1.6-1.3-2.2-.3-4.6-1.1-4.6-5 0-1.1.4-2 1-2.7-.1-.3-.5-1.3.1-2.7 0 0 .8-.3 2.7 1a9.4 9.4 0 0 1 5 0c1.9-1.3 2.7-1 2.7-1 .5 1.4.2 2.4.1 2.7.6.7 1 1.6 1 2.7 0 3.9-2.4 4.7-4.6 5 .4.3.7 1 .7 2v2.9c0 .3.2.6.7.5 3.9-1.3 6.8-5 6.8-9.4 0-5.5-4.5-10-10-10Z"
                />
              </svg>
            </button>
            <button
              type="button"
              aria-label="X (Twitter) profile"
              class="focus-ring transition-colors w-10 h-10 rounded-full flex items-center justify-center border border-spruce-900/10 dark:border-white/10 text-spruce-700 dark:text-spruce-200 hover:text-brass-600 dark:hover:text-brass-400 hover:border-brass-400/50"
            >
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M18.9 2.6h3.2l-7 8 8.2 10.8h-6.4l-5-6.6-5.8 6.6H1.9l7.5-8.6L1.5 2.6h6.5l4.5 6 6.4-6Zm-1.1 17h1.8L7.3 4.4H5.4l12.4 15.2Z" />
              </svg>
            </button>
            <button
              type="button"
              aria-label="LinkedIn profile"
              class="focus-ring transition-colors w-10 h-10 rounded-full flex items-center justify-center border border-spruce-900/10 dark:border-white/10 text-spruce-700 dark:text-spruce-200 hover:text-brass-600 dark:hover:text-brass-400 hover:border-brass-400/50"
            >
              <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path
                  d="M4.98 3.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5ZM3 9.75h4v10.75H3V9.75Zm7 0h3.83v1.47h.05c.53-1 1.85-2.06 3.8-2.06 4.07 0 4.82 2.68 4.82 6.16v6.18h-4v-5.48c0-1.31-.02-3-1.83-3-1.83 0-2.11 1.43-2.11 2.9v5.56h-4V9.75Z"
                />
              </svg>
            </button>
          </div>

          <div class="w-full h-px my-6 bg-gradient-to-r from-transparent via-spruce-900/12 dark:via-white/15 to-transparent" aria-hidden="true"></div>

          <!-- Statistics -->
          <dl class="grid grid-cols-3 w-full gap-2">
            <div class="flex flex-col items-center">
              <dd class="font-mono font-semibold text-lg text-spruce-900 dark:text-white">128</dd>
              <dt class="mt-0.5 text-[11px] uppercase tracking-wide text-spruce-700/60 dark:text-spruce-200/55">Posts</dt>
            </div>
            <div class="flex flex-col items-center border-x border-spruce-900/8 dark:border-white/10">
              <dd class="font-mono font-semibold text-lg text-spruce-900 dark:text-white">8.4K</dd>
              <dt class="mt-0.5 text-[11px] uppercase tracking-wide text-spruce-700/60 dark:text-spruce-200/55">Followers</dt>
            </div>
            <div class="flex flex-col items-center">
              <dd class="font-mono font-semibold text-lg text-spruce-900 dark:text-white">312</dd>
              <dt class="mt-0.5 text-[11px] uppercase tracking-wide text-spruce-700/60 dark:text-spruce-200/55">Following</dt>
            </div>
          </dl>

          <!-- Action buttons -->
          <div class="mt-7 grid grid-cols-2 gap-3 w-full">
            <button
              id="follow-btn"
              type="button"
              aria-pressed="false"
              class="btn-follow focus-ring transition-colors relative rounded-xl py-2.5 text-sm font-semibold"
            >
              <span id="follow-label">Follow</span>
            </button>
            <button
              id="message-btn"
              type="button"
              class="focus-ring transition-colors rounded-xl py-2.5 text-sm font-semibold border border-spruce-900/12 dark:border-white/15 bg-white/50 dark:bg-white/5 text-spruce-900 dark:text-spruce-50 hover:bg-white dark:hover:bg-white/10"
            >
              Message
            </button>
          </div>
        </article>
      </section>

      <!-- Footer -->
      <footer class="text-center mt-4 text-xs text-spruce-700/60 dark:text-spruce-200/50">
        Built with Tailwind CSS + Vanilla JS. Part of the
        <a href="https://github.com/praveenscience/One-File-Tools" class="focus-ring rounded text-brass-600 dark:text-brass-400 hover:underline">One File Tools</a>
        Design System pillar.
      </footer>
    </div>

    <script>
      "use strict";

      //  THEME
      var THEME_KEY = "profile_card_theme_v1";
      var htmlEl = document.documentElement;
      var themeToggle = document.getElementById("theme-toggle");

      function applyTheme(isDark) {
        htmlEl.classList.toggle("dark", isDark);
        themeToggle.setAttribute("aria-pressed", String(isDark));
      }

      function initTheme() {
        // The <head> script already applied the class before first paint —
        // this just syncs the toggle's aria-pressed state to match.
        applyTheme(htmlEl.classList.contains("dark"));
      }
      initTheme();

      themeToggle.addEventListener("click", function () {
        var isDark = !htmlEl.classList.contains("dark");
        applyTheme(isDark);
        try {
          localStorage.setItem(THEME_KEY, isDark ? "dark" : "light");
        } catch (e) {
          /* localStorage unavailable — theme just won't persist */
        }
      });

      //  FOLLOW BUTTON — small demonstrative toggle state
      var followBtn = document.getElementById("follow-btn");
      var followLabel = document.getElementById("follow-label");

      followBtn.addEventListener("click", function () {
        var next = followBtn.getAttribute("aria-pressed") !== "true";
        followBtn.setAttribute("aria-pressed", String(next));
        followBtn.classList.toggle("is-following", next);
        followLabel.textContent = next ? "Following" : "Follow";
      });
    </script>
  </body>
</html>
