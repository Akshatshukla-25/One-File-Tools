<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Reconciler — a vanilla JS horror quest</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕯</text></svg>" />

    <!-- ══════════════════════════════════════════════════════════════
     THE RECONCILER — vanilla edition
     A Victorian manor that is, structurally, a live component tree —
     rendered by a real, hand-written virtual-DOM reconciler living
     right here in this file. No React. No Babel. No build step.
     ══════════════════════════════════════════════════════════════ -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@600;700&family=Cormorant:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

    <style>
      /* ══════════════════════════════════════════════════════════════
   THE MANOR AT NIGHT
   Palette: near-black oak · aged brass · candlelight amber ·
   parchment ink · a single sickly violet reserved for the thing
   in the walls that decides what gets to stay.
   ══════════════════════════════════════════════════════════════ */
      :root {
        --oak: #100c08;
        --oak-mid: #1c150e;
        --oak-edge: #33261a;
        --brass: #b08d57;
        --brass-dim: #6e5738;
        --candle: #eab868;
        --candle-glow: rgba(234, 184, 104, 0.35);
        --parchment: #e3d3b4;
        --ink: #cdbb98;
        --ink-dim: #7a6b52;
        --recon: #9b7fc4;
        --recon-deep: #4d3566;
        --recon-sick: #7c8f5e;
        --danger: #b5533f;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        background: radial-gradient(ellipse 140% 100% at 50% -20%, #241a10 0%, transparent 55%), var(--oak);
        color: var(--ink);
        font-family: "Cormorant", Georgia, serif;
        font-size: 16px;
        overflow: hidden;
      }

      ::selection {
        background: #3a2a15;
        color: var(--parchment);
      }

      .mono {
        font-family: "JetBrains Mono", ui-monospace, monospace;
      }
      .display {
        font-family: "Cormorant SC", "Cormorant", serif;
        letter-spacing: 0.04em;
      }

      /* ── App frame ─────────────────────────────────────────────────── */
      #app {
        height: 100vh;
        display: flex;
        flex-direction: column;
        position: relative;
        z-index: 10;
      }

      /* ── HUD ───────────────────────────────────────────────────────── */
      #hud {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
        padding: 9px 16px;
        border-bottom: 1px solid var(--oak-edge);
        background: rgba(16, 12, 8, 0.88);
      }
      .hud-label {
        font-size: 10.5px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--ink-dim);
      }
      #coherenceWrap {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 220px;
        flex: 1;
      }
      #coherenceBar {
        flex: 1;
        height: 10px;
        border: 1px solid var(--oak-edge);
        border-radius: 2px;
        background: #0a0705;
        overflow: hidden;
        position: relative;
      }
      #coherenceFill {
        height: 100%;
        transition:
          width 0.5s ease,
          background 0.5s ease;
      }
      #coherenceNum {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        width: 42px;
        text-align: right;
      }
      .hud-chip {
        font-size: 11px;
        letter-spacing: 0.1em;
        border: 1px solid var(--oak-edge);
        border-radius: 3px;
        padding: 4px 9px;
        color: var(--brass);
        background: var(--oak-mid);
        font-family: "JetBrains Mono", monospace;
      }
      #floorChip {
        flex: 1;
        text-align: right;
        border: none;
        background: none;
        color: var(--candle);
        font-size: 12px;
        letter-spacing: 0.16em;
      }

      /* ── Stage: manor panel + fiber tree panel ────────────────────── */
      #stage {
        flex: 1;
        display: flex;
        gap: 10px;
        padding: 10px;
        min-height: 0;
      }
      #manor {
        flex: 1.15;
        min-width: 0;
        position: relative;
        border: 1px solid var(--oak-edge);
        border-radius: 4px;
        background: linear-gradient(180deg, rgba(28, 21, 14, 0.92), rgba(16, 12, 8, 0.95));
        overflow-y: auto;
        padding: 20px 22px;
      }
      #treePanel {
        flex: 0.85;
        min-width: 260px;
        position: relative;
        border: 1px solid var(--oak-edge);
        border-radius: 4px;
        background: radial-gradient(ellipse at 50% 0%, #1a130c 0%, #0e0a06 70%);
        display: flex;
        flex-direction: column;
      }
      .panel-label {
        font-size: 10.5px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--ink-dim);
        padding: 9px 12px 4px;
        font-family: "JetBrains Mono", monospace;
      }
      #treeSvgWrap {
        flex: 1;
        position: relative;
      }
      #treeSvg {
        width: 100%;
        height: 100%;
        display: block;
      }
      #diffCanvas {
        position: absolute;
        inset: 0;
        pointer-events: none;
        width: 100%;
        height: 100%;
      }

      /* fiber tree node/edge styling (drawn via SVG, classes applied via JS) */
      .fnode-shell {
        transition: filter 0.4s;
      }
      .fnode-ring {
        fill: none;
        stroke-width: 2;
        transition:
          stroke 0.4s,
          opacity 0.4s;
      }
      .fnode-dot {
        transition:
          fill 0.4s,
          r 0.3s;
      }
      .fnode-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 9.5px;
        fill: var(--ink-dim);
      }
      .fedge {
        stroke: var(--oak-edge);
        stroke-width: 1.4;
        fill: none;
        transition:
          stroke 0.4s,
          stroke-width 0.4s;
      }
      .fedge.active {
        stroke: var(--candle);
        stroke-width: 2.2;
      }
      .fedge.recon {
        stroke: var(--recon);
        stroke-width: 2.2;
      }

      /* ── Whisper log ──────────────────────────────────────────────── */
      #whisperPanel {
        height: 132px;
        border-top: 1px solid var(--oak-edge);
        background: #0a0705;
        display: flex;
        flex-direction: column;
      }
      #whisperBar {
        font-size: 10px;
        letter-spacing: 0.2em;
        color: var(--ink-dim);
        padding: 4px 14px;
        border-bottom: 1px solid var(--oak-edge);
        text-transform: uppercase;
        font-family: "JetBrains Mono", monospace;
      }
      #whisperOut {
        flex: 1;
        overflow-y: auto;
        padding: 7px 14px;
        font-size: 13px;
        line-height: 1.5;
      }
      .w-log {
        color: var(--ink);
      }
      .w-ok {
        color: #9fd88a;
      }
      .w-warn {
        color: var(--brass);
      }
      .w-err {
        color: var(--danger);
      }
      .w-recon {
        color: var(--recon);
        font-style: italic;
        text-shadow: 0 0 6px rgba(155, 127, 196, 0.4);
      }
      .w-dim {
        color: var(--ink-dim);
        font-family: "JetBrains Mono", monospace;
        font-size: 11.5px;
      }

      /* ── Manor content: rooms, doors, controls ───────────────────── */
      .brief {
        color: var(--ink);
        line-height: 1.65;
        font-size: 15px;
        margin: 0 0 14px;
      }
      .brief b {
        color: var(--candle);
        font-weight: 600;
      }
      .brief code {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.85em;
        color: var(--parchment);
        background: rgba(234, 184, 104, 0.08);
        padding: 1px 5px;
        border-radius: 2px;
      }
      .brief .sick {
        color: var(--recon);
      }

      .room-frame {
        border: 1px solid var(--oak-edge);
        border-radius: 5px;
        background: radial-gradient(ellipse 80% 60% at 50% 20%, rgba(234, 184, 104, 0.06), transparent 70%), #150f09;
        padding: 18px;
        margin-bottom: 14px;
        position: relative;
        overflow: hidden;
      }
      .room-frame.buggy {
        border-color: var(--danger);
        animation: room-shake-loop 0.5s infinite;
      }
      .room-frame.fixed {
        border-color: #4d6e42;
      }
      .room-frame.recon-touched {
        border-color: var(--recon);
      }
      @keyframes room-shake-loop {
        25% {
          transform: translate(-2px, 1px);
        }
        75% {
          transform: translate(2px, -1px);
        }
      }

      .door-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin: 10px 0;
      }
      .door {
        flex: 1;
        min-width: 130px;
        text-align: center;
        border: 1px solid var(--oak-edge);
        border-radius: 5px;
        padding: 12px 8px;
        background: #120d08;
      }
      .door .glyph {
        font-size: 30px;
        display: block;
        margin-bottom: 5px;
        filter: grayscale(0.5) brightness(0.75);
      }
      .door.open .glyph {
        filter: none;
      }
      .door.open {
        border-color: #4d6e42;
        box-shadow: 0 0 16px rgba(159, 216, 138, 0.18);
      }
      .door-name {
        font-size: 12.5px;
        color: var(--parchment);
      }
      .door-rule {
        font-size: 10.5px;
        color: var(--ink-dim);
        margin-top: 3px;
        line-height: 1.4;
        font-family: "JetBrains Mono", monospace;
      }

      .act-btn,
      .btn {
        font-family: "Cormorant", serif;
        font-weight: 600;
        font-size: 14.5px;
        cursor: pointer;
        border: 1.5px solid var(--brass);
        border-radius: 4px;
        background: transparent;
        color: var(--brass);
        padding: 8px 16px;
        letter-spacing: 0.03em;
        margin: 3px 6px 3px 0;
        transition:
          background 0.15s,
          transform 0.08s,
          opacity 0.2s,
          border-color 0.2s;
      }
      .act-btn:hover:not(:disabled),
      .btn:hover:not(:disabled) {
        background: rgba(176, 141, 87, 0.12);
      }
      .act-btn:active:not(:disabled),
      .btn:active:not(:disabled) {
        transform: scale(0.97);
      }
      .act-btn:disabled,
      .btn:disabled {
        opacity: 0.32;
        cursor: not-allowed;
      }
      .act-btn.wrong {
        border-color: var(--danger);
        color: #e2a396;
      }
      .act-btn.correct-hint {
        border-color: #4d6e42;
        color: #b7dba3;
      }
      .btn.title-btn {
        font-size: 17px;
        padding: 11px 26px;
        border-width: 2px;
      }
      .btn.recon-btn {
        border-color: var(--recon);
        color: var(--recon);
      }
      .btn.recon-btn:hover:not(:disabled) {
        background: rgba(155, 127, 196, 0.12);
      }

      .chip-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin: 10px 0;
      }
      .opt-chip {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        cursor: pointer;
        border: 1px solid var(--oak-edge);
        border-radius: 4px;
        background: #120d08;
        color: var(--ink);
        padding: 7px 11px;
        transition:
          border-color 0.15s,
          color 0.15s,
          transform 0.08s;
      }
      .opt-chip:hover {
        border-color: var(--brass);
        color: var(--brass);
        transform: translateY(-1px);
      }
      .opt-chip.picked {
        border-color: var(--candle);
        color: var(--candle);
        box-shadow: 0 0 10px rgba(234, 184, 104, 0.25);
      }

      /* Portraits (floor 4) */
      .hall-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        margin: 16px 0;
      }
      .portrait {
        width: 92px;
        text-align: center;
        position: relative;
      }
      .portrait .frame-svg {
        display: block;
        margin: 0 auto;
      }
      .portrait .p-name {
        font-size: 11.5px;
        color: var(--parchment);
        margin-top: 4px;
      }
      .portrait .p-remove {
        margin-top: 5px;
        font-size: 10.5px;
        font-family: "JetBrains Mono", monospace;
        border: 1px solid var(--danger);
        color: #d99b8c;
        background: transparent;
        border-radius: 3px;
        padding: 3px 7px;
        cursor: pointer;
      }
      .portrait .p-remove:hover {
        background: rgba(181, 83, 63, 0.15);
      }
      .portrait.glitching .frame-svg {
        animation: aura-glitch 0.5s steps(2) 3;
      }
      @keyframes aura-glitch {
        50% {
          filter: hue-rotate(90deg) brightness(1.6);
        }
      }

      /* Lever/dial control (floor 3) */
      .dial-btn {
        font-family: "JetBrains Mono", monospace;
        font-size: 12.5px;
        cursor: pointer;
        border: 1px solid var(--brass-dim);
        border-radius: 50px;
        background: #120d08;
        color: var(--brass);
        padding: 8px 18px;
      }
      .dial-btn:hover {
        border-color: var(--brass);
      }

      /* ── Overlays ─────────────────────────────────────────────────── */
      .overlay {
        position: fixed;
        inset: 0;
        z-index: 60;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 28px;
        background: rgba(8, 6, 4, 0.94);
      }
      .title-main {
        font-family: "Cormorant SC", serif;
        font-weight: 700;
        font-size: clamp(38px, 8vw, 78px);
        color: var(--brass);
        text-shadow: 0 0 26px rgba(176, 141, 87, 0.4);
        line-height: 1.05;
      }
      .title-sub {
        font-size: 12px;
        letter-spacing: 0.4em;
        color: var(--ink-dim);
        text-transform: uppercase;
        margin: 12px 0 26px;
        font-family: "JetBrains Mono", monospace;
      }
      .story {
        max-width: 640px;
        font-size: 15.5px;
        line-height: 1.8;
        color: var(--ink);
        margin: 0 auto 26px;
        text-align: left;
      }
      .story b {
        color: var(--candle);
      }
      .story .sick {
        color: var(--recon);
        text-shadow: 0 0 8px rgba(155, 127, 196, 0.4);
      }
      .small-warning {
        margin-top: 22px;
        font-size: 10.5px;
        color: var(--ink-dim);
        font-family: "JetBrains Mono", monospace;
      }

      .lvl-title {
        font-family: "Cormorant SC", serif;
        font-size: clamp(26px, 5vw, 44px);
        color: var(--candle);
        text-shadow: 0 0 20px rgba(234, 184, 104, 0.35);
      }
      .lvl-brief {
        max-width: 580px;
        color: var(--ink);
        font-size: 15px;
        line-height: 1.75;
        margin: 14px auto 26px;
        text-align: left;
      }

      /* ── Ambient effect layers ───────────────────────────────────── */
      #dustCanvas,
      #particles {
        position: fixed;
        inset: 0;
        z-index: 8;
        pointer-events: none;
        width: 100%;
        height: 100%;
      }
      #vig {
        position: fixed;
        inset: 0;
        z-index: 50;
        pointer-events: none;
        background: radial-gradient(ellipse at center, transparent 50%, rgba(4, 3, 2, 0.88) 100%);
      }
      #flicker {
        position: fixed;
        inset: 0;
        z-index: 49;
        pointer-events: none;
        background: rgba(234, 184, 104, 0.02);
        opacity: 0;
      }
      #flicker.on {
        animation: candle-flicker 0.15s steps(2) infinite;
      }
      @keyframes candle-flicker {
        0%,
        100% {
          opacity: 0.02;
        }
        50% {
          opacity: 0.06;
        }
      }
      #reconFlash {
        position: fixed;
        inset: 0;
        z-index: 65;
        pointer-events: none;
        background: radial-gradient(ellipse at center, rgba(155, 127, 196, 0.35), transparent 65%);
        opacity: 0;
      }
      #reconFlash.run {
        animation: recon-pulse 0.8s ease-out;
      }
      @keyframes recon-pulse {
        0% {
          opacity: 0.85;
        }
        100% {
          opacity: 0;
        }
      }

      .shake {
        animation: shake-kf 0.4s linear;
      }
      @keyframes shake-kf {
        20% {
          transform: translate(-3px, 2px);
        }
        40% {
          transform: translate(4px, -2px);
        }
        60% {
          transform: translate(-4px, 1px);
        }
        80% {
          transform: translate(3px, -1px);
        }
      }
      .glitching {
        animation: page-glitch 0.14s steps(2) 3;
      }
      @keyframes page-glitch {
        50% {
          filter: hue-rotate(-60deg) contrast(1.3) saturate(1.4);
          transform: translateX(-3px);
        }
      }

      .term-scroll::-webkit-scrollbar {
        width: 8px;
      }
      .term-scroll::-webkit-scrollbar-thumb {
        background: #2a1e12;
        border-radius: 4px;
      }

      @media (max-width: 880px) {
        #stage {
          flex-direction: column;
          overflow-y: auto;
        }
        #treePanel {
          min-height: 280px;
        }
        #whisperPanel {
          height: 110px;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .glitching,
        .shake,
        .room-frame.buggy,
        #flicker.on,
        #reconFlash.run,
        .portrait.glitching .frame-svg {
          animation: none !important;
        }
      }
      :focus-visible {
        outline: 2px solid var(--candle);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="padding: 40px; color: #cdbb98; font-family: Georgia, serif; background: #100c08">This house needs JavaScript to haunt you properly.</div>
    </noscript>

    <canvas id="dustCanvas"></canvas>
    <canvas id="particles"></canvas>
    <div id="flicker"></div>
    <div id="reconFlash"></div>
    <div id="vig"></div>

    <script>
      /* ══════════════════════════════════════════════════════════════════
   THE RECONCILER — vanilla edition
   Part A: a real, tiny virtual-DOM reconciler (h/createDom/patch),
   a hand-rolled effect system, audio, ambient canvases.
   No React. No Babel. This IS the reconciler.
   ══════════════════════════════════════════════════════════════════ */
      "use strict";

      const REDUCED = !!(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches);
      const $ = (sel) => document.querySelector(sel);
      const $id = (id) => document.getElementById(id);
      const wait = (ms) => new Promise((r) => setTimeout(r, ms));

      /* ════════════════════════ MINI RECONCILER ═══════════════════════════
   h()        — build a vnode tree, plain JS objects, no JSX.
   createDom  — turn a vnode into a real DOM node.
   patch      — diff old vs new vnode, update the real DOM in place.
   Two reconciliation modes for child lists, chosen automatically:
     • KEYED   — children carry props.key; matched and moved by identity.
     • UNKEYED — children matched purely by position (index 0 vs index 0,
                 index 1 vs index 1, …). This is exactly what "using the
                 array index as a key" amounts to — the DOM node, and
                 anything privately attached to it, gets reused by SLOT,
                 not by the logical item's identity.
   ══════════════════════════════════════════════════════════════════ */
      const SVG_NS = "http://www.w3.org/2000/svg";

      function h(tag, props, ...children) {
        props = props || {};
        const flat = children.flat(Infinity).filter((c) => c !== null && c !== undefined && c !== false);
        const kids = flat.map((c) => (typeof c === "object" && c && c.tag !== undefined ? c : { tag: "#text", text: String(c), props: {}, children: [] }));
        return { tag, props, children: kids, key: props.key };
      }

      function setProp(dom, k, v) {
        if (k === "key") return;
        if (k.startsWith("on") && typeof v === "function") {
          dom[k] = v;
          return;
        }
        if (k === "style" && v && typeof v === "object") {
          Object.assign(dom.style, v);
          return;
        }
        if (k === "className") {
          dom.setAttribute("class", v || "");
          return;
        }
        if (v === true) {
          dom.setAttribute(k, "");
          return;
        }
        if (v === false || v === null || v === undefined) {
          dom.removeAttribute(k);
          return;
        }
        dom.setAttribute(k, v);
      }
      function removeProp(dom, k) {
        if (k === "key") return;
        if (k.startsWith("on")) {
          dom[k] = null;
          return;
        }
        if (k === "className") {
          dom.removeAttribute("class");
          return;
        }
        dom.removeAttribute(k);
      }
      function applyProps(dom, oldProps, newProps) {
        oldProps = oldProps || {};
        newProps = newProps || {};
        for (const k in oldProps) if (!(k in newProps)) removeProp(dom, k);
        for (const k in newProps) if (oldProps[k] !== newProps[k]) setProp(dom, k, newProps[k]);
      }

      function createDom(vnode, isSvg) {
        if (vnode.tag === "#text") {
          const d = document.createTextNode(vnode.text);
          vnode.dom = d;
          return d;
        }
        const nowSvg = isSvg || vnode.tag === "svg";
        const dom = nowSvg ? document.createElementNS(SVG_NS, vnode.tag) : document.createElement(vnode.tag);
        applyProps(dom, {}, vnode.props);
        vnode.children.forEach((child) => dom.appendChild(createDom(child, nowSvg)));
        vnode.dom = dom;
        return dom;
      }

      function patch(parentDom, newVNode, oldVNode, isSvg) {
        if (!oldVNode) {
          const dom = createDom(newVNode, isSvg);
          parentDom.appendChild(dom);
          return newVNode;
        }
        if (!newVNode) {
          if (oldVNode.dom && oldVNode.dom.parentNode === parentDom) parentDom.removeChild(oldVNode.dom);
          return null;
