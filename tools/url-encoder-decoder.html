<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Encoder / Decoder — One File Tools</title>
    <meta name="description" content="Encode and decode URLs or percent-encoded strings instantly using native browser APIs.">
    <style>
      /* ========================================
       Reset & Base
       ======================================== */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        line-height: 1.6;
        padding: 2rem;
        max-width: 960px;
        margin: 0 auto;
        background: #fafafa;
        color: #1a1a1a;
      }

      /* ========================================
       Dark Mode
       ======================================== */
      @media (prefers-color-scheme: dark) {
        body {
          background: #0a0a0a;
          color: #e5e5e5;
        }
      }

      header {
        text-align: center;
        margin-bottom: 2rem;
      }

      header p {
        color: #666;
      }

      @media (prefers-color-scheme: dark) {
        header p {
          color: #aaa;
        }
      }

      .container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
      }

      .panel {
        background: white;
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 1.5rem;
      }

      @media (prefers-color-scheme: dark) {
        .panel {
          background: #161616;
          border-color: #333;
        }
      }

      h2 {
        margin-bottom: 1rem;
      }

      label {
        display: block;
        margin-top: 1rem;
        margin-bottom: 0.4rem;
        font-weight: 600;
      }

      textarea,
      select {
        width: 100%;
        padding: 0.75rem;
        border-radius: 8px;
        border: 1px solid #bbb;
        font-size: 15px;
      }

      textarea {
        resize: vertical;
        font-family: Consolas, monospace;
      }

      textarea:focus,
      select:focus {
        outline: 2px solid #1d9bf0;
        outline-offset: 2px;
      }

      small {
        display: block;
        margin-top: 0.5rem;
        color: #666;
      }

      #errorMessage {
        color: #dc2626;
        background: #fee2e2;
        padding: 10px;
        border-radius: 8px;
        margin-top: 12px;
        display: none;
      }

      @media (prefers-color-scheme: dark) {
        #errorMessage {
          background: #7f1d1d;
          color: #fecaca;
        }
      }
      .buttons {
        display: flex;
        gap: 0.75rem;
        margin-top: 1.5rem;
      }

      button {
        padding: 0.8rem 1.2rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #1d9bf0;
        color: white;
        font-size: 15px;
      }

      button:hover {
        opacity: 0.9;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      #resetBtn {
        background: #666;
      }

      footer {
        text-align: center;
        margin-top: 2rem;
      }

      @media (max-width: 768px) {
        .container {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>URL Encoder / Decoder</h1>

      <p>Encode and decode URLs, query parameters, and percent-encoded strings instantly using native browser APIs.</p>
    </header>

    <main>
      <div class="container">
        <!-- Left Panel -->
        <section class="panel">
          <h2>Input</h2>

          <label for="mode">Mode</label>

          <select id="mode">
            <option value="encodeURI">Encode URI</option>
            <option value="encodeURIComponent">Encode URI Component</option>
            <option value="decodeURIComponent">Decode Percent-Encoding</option>
          </select>

          <label for="inputText">Input Text</label>

          <textarea id="inputText" placeholder="Enter a complete URL..."></textarea>

          <small id="inputCount">0 characters</small>

          <p id="errorMessage"></p>

          <div class="buttons">
            <button id="exampleBtn">Load Example</button>
            <button id="resetBtn">Reset</button>
          </div>
        </section>

        <!-- Right Panel -->

        <section class="panel">
          <h2>Output</h2>

          <textarea id="outputText" rows="12" readonly placeholder="Output will appear here..."></textarea>

          <small id="outputCount">0 characters</small>

          <div class="buttons">
            <button id="copyBtn">Copy</button>
            <button id="swapBtn">Swap</button>
          </div>
        </section>
      </div>
    </main>

    <footer>
      <a href="https://github.com/praveenscience/One-File-Tools" target="_blank" rel="noopener noreferrer"> One File Tools </a>
    </footer>

    <script>
      const mode = document.getElementById("mode");

      const inputText = document.getElementById("inputText");
      const outputText = document.getElementById("outputText");

      const inputCount = document.getElementById("inputCount");
      const outputCount = document.getElementById("outputCount");

      const errorMessage = document.getElementById("errorMessage");
      const exampleBtn = document.getElementById("exampleBtn");
      const copyBtn = document.getElementById("copyBtn");
      const swapBtn = document.getElementById("swapBtn");
      const resetBtn = document.getElementById("resetBtn");
      copyBtn.disabled = true;
      swapBtn.disabled = true;
      function convertText() {
        const text = inputText.value;

        inputCount.textContent = `${text.length} character${text.length === 1 ? "" : "s"}`;

        errorMessage.style.display = "none";
        errorMessage.textContent = "";

        if (!text) {
          outputText.value = "";
          outputCount.textContent = "0 characters";
          copyBtn.disabled = true;
          swapBtn.disabled = true;
          return;
        }

        try {
          let result = "";

          switch (mode.value) {
            case "encodeURI":
              result = encodeURI(text);
              break;

            case "encodeURIComponent":
              result = encodeURIComponent(text);
              break;

            case "decodeURIComponent":
              result = decodeURIComponent(text);
              break;
          }

          outputText.value = result;
          outputCount.textContent = `${result.length} character${result.length === 1 ? "" : "s"}`;
          copyBtn.disabled = false;
          swapBtn.disabled = false;
        } catch {
          outputText.value = "";
          outputCount.textContent = "0 characters";
          copyBtn.disabled = true;
          swapBtn.disabled = true;
          errorMessage.style.display = "block";

          errorMessage.textContent = "Invalid or malformed percent-encoded string.";
        }
      }
      inputText.addEventListener("input", convertText);

      resetBtn.addEventListener("click", () => {
        inputText.value = "";
        outputText.value = "";
        errorMessage.style.display = "none";
        errorMessage.textContent = "";

        inputCount.textContent = "0 characters";
        outputCount.textContent = "0 characters";

        mode.value = "encodeURI";
        copyBtn.disabled = true;
        swapBtn.disabled = true;
        convertText();
      });

      copyBtn.addEventListener("click", async () => {
        if (!outputText.value) return;

        try {
          await navigator.clipboard.writeText(outputText.value);

          const originalText = copyBtn.textContent;
          const originalColor = copyBtn.style.backgroundColor;

          copyBtn.textContent = "Copied!";
          copyBtn.style.backgroundColor = "#16a34a";

          setTimeout(() => {
            copyBtn.textContent = originalText;
            copyBtn.style.backgroundColor = originalColor || "#1d9bf0";
          }, 2000);
        } catch {
          alert("Failed to copy.");
        }
      });
      swapBtn.addEventListener("click", () => {
        if (!outputText.value) return;

        const temp = inputText.value;
        inputText.value = outputText.value;
        outputText.value = temp;

        convertText();
      });
      exampleBtn.addEventListener("click", () => {
        switch (mode.value) {
          case "encodeURI":
            inputText.value = "https://example.com/search?q=hello world&lang=en&sort=latest";
            break;

          case "encodeURIComponent":
            inputText.value = "hello world & JavaScript = awesome!";
            break;

          case "decodeURIComponent":
            inputText.value = "hello%20world%20%26%20JavaScript%20%3D%20awesome!";
            break;
        }

        convertText();
      });
      mode.addEventListener("change", () => {
        switch (mode.value) {
          case "encodeURI":
            inputText.placeholder = "Enter a complete URL...";
            break;

          case "encodeURIComponent":
            inputText.placeholder = "Enter a query parameter or text...";
            break;

          case "decodeURIComponent":
            inputText.placeholder = "Paste percent-encoded text...";
            break;
        }

        convertText();
      });
      convertText();
    </script>
  </body>
</html>
